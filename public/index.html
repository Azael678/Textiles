<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Textiles</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f2f2f2; }
    .container { max-width: 400px; margin: 80px auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    h1 { text-align: center; margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; font-size: 16px; cursor: pointer; }
    button:hover { background: #0056d6; }
    .alert { margin-top: 16px; padding: 12px; border-radius: 8px; }
    .alert.error { background: #ffe5e5; color: #b80000; }
    .alert.success { background: #e5ffe5; color: #0f6217; }
    .actions { margin-top: 24px; display: grid; gap: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login Textiles</h1>
    <form id="login-form">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" required autocomplete="username" />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />

      <button type="submit">Iniciar sesión</button>
    </form>
    <div id="message" class="alert" style="display:none"></div>
    <div class="actions">
      <button id="fetch-telas" type="button" disabled>Ver Telas</button>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
